<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Developer Growth Tracker{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="{{ url_for('home') }}" class="logo">
                <span class="logo-icon">📈</span>
                Developer Growth Tracker
            </a>
            {% block header_search %}{% endblock %}
        </div>
    </header>

    <main class="container {% block container_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        Built with the GitHub API · Public profile analytics
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
