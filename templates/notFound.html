{% extends "base.html" %}

{% block title %}User not found — Developer Growth Tracker{% endblock %}
{% block container_class %}container-narrow{% endblock %}

{% block content %}
<section class="not-found">
    <div class="not-found-icon">🔍</div>
    <h1>User not found</h1>
    <p>No GitHub account exists for <code>{{ user }}</code>. Check the spelling and try again.</p>

    <form class="search-form" method="POST">
        <input
            class="search-input"
            type="text"
            name="username"
            placeholder="Enter GitHub Username"
            required
            autofocus
        />
        <button class="btn" type="submit">Search</button>
    </form>
</section>
{% endblock %}
