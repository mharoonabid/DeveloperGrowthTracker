services:
  - type: web
    name: developer-growth-tracker
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 app:app"
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: developer_growth_tracker
      - key: CACHE_TTL_HOURS
        value: "6"
